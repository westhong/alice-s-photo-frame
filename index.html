<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Alice's Photo Frame</title>
    <meta name="theme-color" content="#d946ef">
    <meta name="description" content="Alice's magical photo frame — add cute frames and watermarks to your photos!">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e7d5ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Upload Screen ─────────────────────────────── */
        .upload-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        h1 {
            color: #d946ef;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(217, 70, 239, 0.2);
        }

        .upload-button {
            background: linear-gradient(135deg, #ff6ec7 0%, #d946ef 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 24px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(217, 70, 239, 0.4);
            transition: all 0.3s ease;
        }

        .upload-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(217, 70, 239, 0.5);
        }

        .upload-button:active {
            transform: translateY(-2px);
        }

        .upload-button::before {
            content: '📸';
            font-size: 32px;
            margin-right: 12px;
        }

        /* ── Processing Screen ─────────────────────────── */
        .processing-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff6ec7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        .processing-text {
            color: #d946ef;
            font-size: 28px;
            font-weight: bold;
        }

        /* ── Filter Screen ─────────────────────────────── */
        .filter-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 620px;
            animation: fadeIn 0.5s ease;
        }

        .filter-screen h2 {
            color: #d946ef;
            font-size: 22px;
            margin-bottom: 18px;
            text-shadow: 1px 1px 3px rgba(217,70,239,0.2);
        }

        /* Preview image (before canvas render) */
        .filter-preview-wrap {
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            margin-bottom: 22px;
            width: 100%;
            max-width: 560px;
            position: relative;
        }

        #previewCanvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* Filter pill grid */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 560px;
            margin-bottom: 24px;
        }

        .filter-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 6px 8px;
            border: 3px solid transparent;
            border-radius: 16px;
            background: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .filter-pill:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(217,70,239,0.2);
        }

        .filter-pill.active {
            border-color: #d946ef;
            background: rgba(217,70,239,0.1);
            box-shadow: 0 4px 16px rgba(217,70,239,0.3);
        }

        .filter-thumb {
            width: 54px;
            height: 54px;
            border-radius: 10px;
            object-fit: cover;
            display: block;
        }

        .filter-name {
            font-size: 11px;
            font-weight: bold;
            color: #9333ea;
            text-align: center;
            line-height: 1.2;
        }

        .filter-apply-btn {
            background: linear-gradient(135deg, #ff6ec7 0%, #d946ef 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(217,70,239,0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
        }

        .filter-apply-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(217,70,239,0.5);
        }

        .filter-apply-btn::before {
            content: '✨';
            margin-right: 10px;
        }

        /* ── Result Screen ─────────────────────────────── */
        .result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.6s ease;
        }

        .photo-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
            max-width: 100%;
        }

        #resultCanvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .save-button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 24px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
            margin-bottom: 14px;
        }

        .save-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(16, 185, 129, 0.5);
        }

        .save-button:active { transform: translateY(-2px); }

        .save-button::before {
            content: '💾';
            font-size: 36px;
            margin-right: 12px;
        }

        .row-btns {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .refilter-button, .new-photo-button {
            flex: 1;
            background: transparent;
            font-size: 15px;
            font-weight: bold;
            padding: 14px 10px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refilter-button {
            color: #a855f7;
            border: 3px solid #a855f7;
        }

        .refilter-button:hover {
            background: #a855f7;
            color: white;
        }

        .new-photo-button {
            color: #d946ef;
            border: 3px solid #d946ef;
        }

        .new-photo-button:hover {
            background: #d946ef;
            color: white;
        }

        /* Hidden file input */
        #fileInput { display: none; }

        /* ── Animations ────────────────────────────────── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Mobile ────────────────────────────────────── */
        @media (max-width: 480px) {
            h1 { font-size: 26px; }

            .upload-button, .save-button {
                font-size: 20px;
                padding: 20px 36px;
            }

            .logo { font-size: 48px; }

            .filter-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .filter-thumb {
                width: 44px;
                height: 44px;
            }

            .filter-name { font-size: 10px; }
        }
    </style>
</head>
<body>

    <!-- ── Upload Screen ── -->
    <div class="upload-screen" id="uploadScreen">
        <div class="logo">✨📷✨</div>
        <h1>Alice's Photo Frame</h1>
        <button class="upload-button" id="uploadBtn">Upload Photo</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- ── Processing Screen ── -->
    <div class="processing-screen" id="processingScreen">
        <div class="spinner"></div>
        <div class="processing-text">Adding magic... ✨</div>
    </div>

    <!-- ── Filter Screen ── -->
    <div class="filter-screen" id="filterScreen">
        <h2>🎨 Choose a Filter</h2>

        <div class="filter-preview-wrap">
            <canvas id="previewCanvas"></canvas>
        </div>

        <div class="filter-grid" id="filterGrid">
            <!-- Pills injected by JS -->
        </div>

        <button class="filter-apply-btn" id="applyFilterBtn">Apply &amp; Add Frame</button>
    </div>

    <!-- ── Result Screen ── -->
    <div class="result-screen" id="resultScreen">
        <div class="photo-container">
            <canvas id="resultCanvas"></canvas>
        </div>
        <button class="save-button" id="saveBtn">Save to Phone</button>
        <div class="row-btns">
            <button class="refilter-button" id="refilterBtn">🎨 Change Filter</button>
            <button class="new-photo-button" id="newPhotoBtn">📸 New Photo</button>
        </div>
    </div>

    <script>
    // ── DOM refs ──────────────────────────────────────────────────────────
    const uploadScreen    = document.getElementById('uploadScreen');
    const processingScreen= document.getElementById('processingScreen');
    const filterScreen    = document.getElementById('filterScreen');
    const resultScreen    = document.getElementById('resultScreen');
    const uploadBtn       = document.getElementById('uploadBtn');
    const fileInput       = document.getElementById('fileInput');
    const saveBtn         = document.getElementById('saveBtn');
    const newPhotoBtn     = document.getElementById('newPhotoBtn');
    const refilterBtn     = document.getElementById('refilterBtn');
    const applyFilterBtn  = document.getElementById('applyFilterBtn');
    const filterGrid      = document.getElementById('filterGrid');
    const previewCanvas   = document.getElementById('previewCanvas');
    const resultCanvas    = document.getElementById('resultCanvas');
    const pCtx            = previewCanvas.getContext('2d');
    const rCtx            = resultCanvas.getContext('2d');

    // ── Config ────────────────────────────────────────────────────────────
    const FRAME_WIDTH      = 30;
    const WATERMARK_TEXT   = 'photo by Alice';
    const WATERMARK_FONT   = 24;
    const WATERMARK_PAD    = 20;

    // ── Filter definitions ────────────────────────────────────────────────
    // Each filter is a CSS filter string applied to a temp canvas via drawImage,
    // PLUS an optional overlay for effects that need blending.
    const FILTERS = [
        {
            id: 'none',
            name: '✨ Original',
            css: 'none',
            overlay: null,
        },
        {
            id: 'pink',
            name: '🌸 Pinky',
            css: 'saturate(1.4) brightness(1.05)',
            overlay: { color: 'rgba(255,105,180,0.18)', blend: 'source-over' },
        },
        {
            id: 'rose',
            name: '🌹 Rose',
            css: 'saturate(1.2) hue-rotate(330deg) brightness(1.08)',
            overlay: { color: 'rgba(255,80,120,0.15)', blend: 'source-over' },
        },
        {
            id: 'dreamy',
            name: '🦄 Dreamy',
            css: 'saturate(1.1) brightness(1.12) contrast(0.9)',
            overlay: { color: 'rgba(200,150,255,0.2)', blend: 'source-over' },
        },
        {
            id: 'vintage',
            name: '📷 Vintage',
            css: 'sepia(0.55) contrast(1.1) brightness(0.95) saturate(0.85)',
            overlay: { color: 'rgba(120,80,20,0.12)', blend: 'source-over' },
        },
        {
            id: 'retro',
            name: '🎞️ Retro',
            css: 'sepia(0.8) saturate(1.6) contrast(1.15) brightness(0.9)',
            overlay: { color: 'rgba(180,100,0,0.15)', blend: 'source-over' },
        },
        {
            id: 'bw',
            name: '🖤 B&W',
            css: 'grayscale(1) contrast(1.1)',
            overlay: null,
        },
        {
            id: 'dramatic',
            name: '🎭 Drama',
            css: 'grayscale(0.3) contrast(1.4) brightness(0.88)',
            overlay: null,
        },
        {
            id: 'vivid',
            name: '🌈 Vivid',
            css: 'saturate(2) contrast(1.15) brightness(1.05)',
            overlay: null,
        },
        {
            id: 'cool',
            name: '🧊 Cool',
            css: 'saturate(1.1) hue-rotate(185deg) brightness(1.05)',
            overlay: { color: 'rgba(100,200,255,0.12)', blend: 'source-over' },
        },
        {
            id: 'warm',
            name: '🌅 Warm',
            css: 'saturate(1.3) hue-rotate(10deg) brightness(1.08)',
            overlay: { color: 'rgba(255,160,50,0.15)', blend: 'source-over' },
        },
        {
            id: 'fade',
            name: '☁️ Fade',
            css: 'saturate(0.7) brightness(1.15) contrast(0.85)',
            overlay: { color: 'rgba(255,255,255,0.18)', blend: 'source-over' },
        },
    ];

    // ── State ─────────────────────────────────────────────────────────────
    let originalImg     = null;   // loaded Image object
    let selectedFilter  = 'none';

    // ── Upload flow ───────────────────────────────────────────────────────
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) loadImage(file);
    });

    function loadImage(file) {
        show(processingScreen);
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                originalImg = img;
                selectedFilter = 'none';
                buildFilterThumbs();         // build thumbnails from actual image
                renderPreview(selectedFilter);
                setTimeout(() => show(filterScreen), 600);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ── Build filter thumbnail pills ──────────────────────────────────────
    function buildFilterThumbs() {
        filterGrid.innerHTML = '';
        FILTERS.forEach(f => {
            // Make a small 60×60 thumb canvas
            const thumb = document.createElement('canvas');
            thumb.width  = 60;
            thumb.height = 60;
            const tc = thumb.getContext('2d');

            // Crop center square from original image
            const src = originalImg;
            const side = Math.min(src.width, src.height);
            const sx   = (src.width  - side) / 2;
            const sy   = (src.height - side) / 2;

            // Apply CSS filter via offscreen canvas trick
            tc.filter = f.css === 'none' ? '' : f.css;
            tc.drawImage(src, sx, sy, side, side, 0, 0, 60, 60);
            tc.filter = 'none';

            // Overlay
            if (f.overlay) {
                tc.fillStyle = f.overlay.color;
                tc.globalCompositeOperation = f.overlay.blend;
                tc.fillRect(0, 0, 60, 60);
                tc.globalCompositeOperation = 'source-over';
            }

            // Build pill
            const pill = document.createElement('div');
            pill.className = 'filter-pill' + (f.id === selectedFilter ? ' active' : '');
            pill.dataset.id = f.id;

            const img = document.createElement('img');
            img.className = 'filter-thumb';
            img.src = thumb.toDataURL('image/jpeg', 0.85);

            const label = document.createElement('div');
            label.className = 'filter-name';
            label.textContent = f.name;

            pill.appendChild(img);
            pill.appendChild(label);
            pill.addEventListener('click', () => selectFilter(f.id));
            filterGrid.appendChild(pill);
        });
    }

    function selectFilter(id) {
        selectedFilter = id;
        // Update active pill
        filterGrid.querySelectorAll('.filter-pill').forEach(p => {
            p.classList.toggle('active', p.dataset.id === id);
        });
        renderPreview(id);
    }

    // ── Render preview canvas (full image + filter, no frame yet) ─────────
    function renderPreview(filterId) {
        const f   = FILTERS.find(x => x.id === filterId);
        const img = originalImg;

        previewCanvas.width  = img.width;
        previewCanvas.height = img.height;

        pCtx.filter = f.css === 'none' ? '' : f.css;
        pCtx.drawImage(img, 0, 0);
        pCtx.filter = 'none';

        if (f.overlay) {
            pCtx.fillStyle = f.overlay.color;
            pCtx.globalCompositeOperation = f.overlay.blend;
            pCtx.fillRect(0, 0, img.width, img.height);
            pCtx.globalCompositeOperation = 'source-over';
        }
    }

    // ── Apply filter + frame → result canvas ─────────────────────────────
    applyFilterBtn.addEventListener('click', () => {
        show(processingScreen);
        setTimeout(() => {
            renderResult(selectedFilter);
            show(resultScreen);
        }, 500);
    });

    function renderResult(filterId) {
        const f          = FILTERS.find(x => x.id === filterId);
        const img        = originalImg;
        const fw         = FRAME_WIDTH;
        const totalW     = img.width  + fw * 2;
        const totalH     = img.height + fw * 2;

        resultCanvas.width  = totalW;
        resultCanvas.height = totalH;

        // White frame background
        rCtx.fillStyle = '#ffffff';
        rCtx.fillRect(0, 0, totalW, totalH);

        // Draw filtered image
        rCtx.filter = f.css === 'none' ? '' : f.css;
        rCtx.drawImage(img, fw, fw, img.width, img.height);
        rCtx.filter = 'none';

        // Overlay (if any)
        if (f.overlay) {
            rCtx.fillStyle = f.overlay.color;
            rCtx.globalCompositeOperation = f.overlay.blend;
            rCtx.fillRect(fw, fw, img.width, img.height);
            rCtx.globalCompositeOperation = 'source-over';
        }

        // Watermark
        rCtx.font         = `${WATERMARK_FONT}px 'Comic Sans MS', Arial`;
        rCtx.fillStyle    = '#ffffff';
        rCtx.textAlign    = 'right';
        rCtx.textBaseline = 'bottom';
        rCtx.shadowColor  = 'rgba(0,0,0,0.5)';
        rCtx.shadowBlur   = 4;
        rCtx.shadowOffsetX = 2;
        rCtx.shadowOffsetY = 2;
        rCtx.fillText(
            WATERMARK_TEXT,
            totalW - WATERMARK_PAD - fw,
            totalH - WATERMARK_PAD - fw
        );
        rCtx.shadowColor = 'transparent';
    }

    // ── Save ──────────────────────────────────────────────────────────────
    saveBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `alice-photo-${Date.now()}.png`;
        link.href = resultCanvas.toDataURL('image/png');
        link.click();
    });

    // ── Change filter (go back to filter screen) ──────────────────────────
    refilterBtn.addEventListener('click', () => {
        show(filterScreen);
    });

    // ── New photo ─────────────────────────────────────────────────────────
    newPhotoBtn.addEventListener('click', () => {
        fileInput.value = '';
        originalImg    = null;
        selectedFilter = 'none';
        show(uploadScreen);
    });

    // ── Helper: show one screen, hide others ──────────────────────────────
    function show(el) {
        [uploadScreen, processingScreen, filterScreen, resultScreen].forEach(s => {
            s.style.display = 'none';
        });
        el.style.display = 'flex';
    }

    // ── PWA Service Worker ────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('[App] SW registered:', reg.scope))
                .catch(err => console.log('[App] SW failed:', err));
        });
    }
    </script>
</body>
</html>
